<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quick complement — Palette Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root,[data-theme="light"]{--bg:#FBFBFE;--surface:#FFFFFF;--s2:#F1F2FF;--border:#E6E7F8;--bstrong:#D3D5F0;--text:#20223A;--muted:#6E7293;--faint:#A2A6C4;--accent:#7C3AED;--accent-weak:#F0EAFE;--on-accent:#FFF;--r-card:14px;--r-ctrl:10px;}
  [data-theme="dark"]{--bg:#141110;--surface:#1C1815;--s2:#251F1A;--border:#3A302A;--bstrong:#4D4138;--text:#ECE3D8;--muted:#A8998A;--faint:#7C6F62;--accent:#C2912F;--accent-weak:#2C2113;--on-accent:#15100A;}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:14px;transition:background .2s,color .2s}
  .mono{font-family:ui-monospace,Menlo,monospace}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:17px;margin:0}
  .bar{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);max-width:760px;margin:0 auto}
  .mark{width:26px;height:26px;border-radius:8px;background:var(--accent);color:var(--on-accent);display:grid;place-items:center;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:15px}
  .sub{color:var(--faint);font-weight:500;font-size:13px}
  .spacer{flex:1}
  .icon{height:34px;width:34px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--r-ctrl);cursor:pointer}
  main{max-width:760px;margin:0 auto;padding:22px 20px}
  .inrow{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
  .lbl{font-size:11.5px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
  input[type=color]{width:36px;height:36px;border:none;background:none;padding:0;cursor:pointer}
  .hexin{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-ctrl);padding:0 10px;height:36px}
  .hexin input{border:none;background:transparent;color:var(--text);font-family:ui-monospace,monospace;font-size:13.5px;width:74px;outline:none;text-transform:uppercase}
  .hexin:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
  .chip{width:24px;height:24px;border-radius:7px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.2);cursor:pointer}
  .pair{display:flex;gap:14px;flex-wrap:wrap;align-items:stretch}
  .col{flex:1;min-width:170px;animation:rise .4s cubic-bezier(.2,.7,.2,1) both}
  .col:nth-child(3){animation-delay:.06s}
  .sw{height:150px;border-radius:var(--r-card);box-shadow:inset 0 0 0 1px rgba(0,0,0,.14);display:flex;align-items:flex-end;padding:12px}
  .sw .h{font-family:ui-monospace,monospace;font-size:15px;font-weight:500}
  .meta{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
  .meta .role{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px}
  .near{font-size:12px;color:var(--muted);margin-top:3px}
  .near b{color:var(--text);font-weight:500}
  .mid{display:flex;align-items:center;font-family:ui-monospace,monospace;font-size:12px;color:var(--faint)}
  .copy{border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:8px;height:26px;padding:0 8px;font-size:11.5px;cursor:pointer}
  .copy:hover{border-color:var(--bstrong);color:var(--text)}
  .note{color:var(--faint);font-size:12px;margin-top:18px;line-height:1.6}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(.88)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
  .bump{animation:pop .32s cubic-bezier(.34,1.56,.64,1)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="bar"><span class="mark">P</span><h1>Palette Studio <span class="sub">· quick complement</span></h1><div class="spacer"></div><button class="icon" id="theme" aria-label="Toggle theme">◐</button></div>
<main>
  <div class="inrow">
    <span class="lbl">Your primary</span>
    <input type="color" id="pick" value="#2D567C" aria-label="Primary colour" />
    <div class="hexin"><span style="color:var(--faint)">#</span><input id="hex" maxlength="6" value="2D567C" aria-label="Primary hex" /></div>
    <span id="chips" style="display:inline-flex;gap:6px;margin-left:4px"></span>
  </div>
  <div class="pair">
    <div class="col">
      <div class="sw" id="swP"><span class="h" id="hP"></span></div>
      <div class="meta"><span class="role">Primary</span><button class="copy" data-t="P">Copy</button></div>
      <div class="near" id="nP"></div>
    </div>
    <div class="mid">180°</div>
    <div class="col">
      <div class="sw" id="swC"><span class="h" id="hC"></span></div>
      <div class="meta"><span class="role">Complement</span><button class="copy" data-t="C">Copy</button></div>
      <div class="near" id="nC"></div>
    </div>
  </div>
  <p class="note"><strong>Complementary</strong> = the opposite hue (rotated 180°), same saturation and lightness. The ideal hex is exact; the nearest paint is the closest one you can actually buy by ΔE 2000. Demo paint sample only.</p>
</main>
<script>
const hx=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
const xh=a=>'#'+a.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('').toUpperCase();
const lin=c=>{c/=255;return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);};
const r2h=([r,g,b])=>{r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn)h=s=0;else{const d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);h=mx===r?(g-b)/d+(g<b?6:0):mx===g?(b-r)/d+2:(r-g)/d+4;h/=6;}return[h*360,s,l];};
const h2h=(h,s,l)=>{h=(h%360+360)%360;const C=(1-Math.abs(2*l-1))*s,X=C*(1-Math.abs((h/60)%2-1)),m=l-C/2;let a;if(h<60)a=[C,X,0];else if(h<120)a=[X,C,0];else if(h<180)a=[0,C,X];else if(h<240)a=[0,X,C];else if(h<300)a=[X,0,C];else a=[C,0,X];return xh([(a[0]+m)*255,(a[1]+m)*255,(a[2]+m)*255]);};
const comp=c=>{const[h,s,l]=r2h(hx(c));return h2h(h+180,s,l);};
function lab([r,g,b]){const R=lin(r),G=lin(g),B=lin(b);const x=(R*0.4124+G*0.3576+B*0.1805)/0.95047,y=R*0.2126+G*0.7152+B*0.0722,z=(R*0.0193+G*0.1192+B*0.9505)/1.08883;const f=t=>t>Math.pow(6/29,3)?Math.cbrt(t):t/(3*Math.pow(6/29,2))+4/29;return[116*f(y)-16,500*(f(x)-f(y)),200*(f(y)-f(z))];}
function dE(l1,l2){const[L1,a1,b1]=l1,[L2,a2,b2]=l2,r=Math.PI/180,d=180/Math.PI;const C1=Math.hypot(a1,b1),C2=Math.hypot(a2,b2),Cb=(C1+C2)/2,Cb7=Math.pow(Cb,7),G=0.5*(1-Math.sqrt(Cb7/(Cb7+Math.pow(25,7))));const A1=(1+G)*a1,A2=(1+G)*a2,P1=Math.hypot(A1,b1),P2=Math.hypot(A2,b2);let h1=Math.atan2(b1,A1);if(h1<0)h1+=2*Math.PI;let h2=Math.atan2(b2,A2);if(h2<0)h2+=2*Math.PI;const dL=L2-L1,dC=P2-P1;let dh=0;if(P1*P2!==0){dh=h2-h1;if(dh>Math.PI)dh-=2*Math.PI;else if(dh<-Math.PI)dh+=2*Math.PI;}const dH=2*Math.sqrt(P1*P2)*Math.sin(dh/2),Lb=(L1+L2)/2,Pb=(P1+P2)/2;let hb;if(P1*P2===0)hb=h1+h2;else hb=(Math.abs(h1-h2)>Math.PI)?(h1+h2+2*Math.PI)/2:(h1+h2)/2;const T=1-0.17*Math.cos(hb-30*r)+0.24*Math.cos(2*hb)+0.32*Math.cos(3*hb+6*r)-0.2*Math.cos(4*hb-63*r);const dT=30*r*Math.exp(-Math.pow((hb*d-275)/25,2)),Pb7=Math.pow(Pb,7),Rc=2*Math.sqrt(Pb7/(Pb7+Math.pow(25,7))),Sl=1+0.015*Math.pow(Lb-50,2)/Math.sqrt(20+Math.pow(Lb-50,2)),Sc=1+0.045*Pb,Sh=1+0.015*Pb*T,Rt=-Math.sin(2*dT)*Rc;return Math.sqrt((dL/Sl)**2+(dC/Sc)**2+(dH/Sh)**2+Rt*(dC/Sc)*(dH/Sh));}
const POOL=[["Mephiston Red","Citadel","#9A1115"],["Evil Sunz Scarlet","Citadel","#C21920"],["Troll Slayer Orange","Citadel","#F46C2E"],["Averland Sunset","Citadel","#FCB41D"],["Flash Gitz Yellow","Citadel","#FFE700"],["Moot Green","Citadel","#A5D610"],["Warpstone Glow","Citadel","#106B21"],["Caliban Green","Citadel","#005221"],["Sotek Green","Citadel","#006B5A"],["Kabalite Green","Citadel","#069B7D"],["Teclis Blue","Citadel","#8BB9DD"],["Caledor Sky","Citadel","#31639C"],["Macragge Blue","Citadel","#2D567C"],["Kantor Blue","Citadel","#08085A"],["Naggaroth Night","Citadel","#562F7E"],["Xereus Purple","Citadel","#5A105E"],["Screamer Pink","Citadel","#9C0E4E"],["Bugman's Glow","Citadel","#A95C3E"],["Ushabti Bone","Citadel","#EFD9A8"],["Administratum Grey","Citadel","#B5B5B5"]];
const PL=POOL.map(p=>lab(hx(p[2])));
const near=c=>{const t=lab(hx(c));let bi=0,bd=1e9;for(let i=0;i<POOL.length;i++){const d=dE(t,PL[i]);if(d<bd){bd=d;bi=i;}}return{p:POOL[bi],d:bd};};
const txt=c=>{const[r,g,b]=hx(c).map(lin);return 0.2126*r+0.7152*g+0.0722*b>0.4?'#15150F':'#FFFFFF';};
const PRESETS=["#9A1115","#2D567C","#005221","#FCB41D","#562F7E","#006B5A"];
document.getElementById('chips').innerHTML=PRESETS.map(c=>`<span class="chip" data-c="${c}" style="background:${c}"></span>`).join('');
let cur={P:'#2D567C',C:'#C8783A'};
function fill(el,hexEl,hexv){const t=txt(hexv);el.style.background=hexv;hexEl.textContent=hexv;hexEl.style.color=t;el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');}
function render(prim){const c=comp(prim);cur={P:prim,C:c};
  fill(document.getElementById('swP'),document.getElementById('hP'),prim);
  fill(document.getElementById('swC'),document.getElementById('hC'),c);
  const nP=near(prim),nC=near(c);
  document.getElementById('nP').innerHTML=`nearest paint: <b>${nP.p[0]}</b> · ${nP.p[1]} · ΔE ${nP.d.toFixed(1)}`;
  document.getElementById('nC').innerHTML=`nearest paint: <b>${nC.p[0]}</b> · ${nC.p[1]} · ΔE ${nC.d.toFixed(1)}`;}
function setP(hexv){hexv=hexv.toUpperCase();document.getElementById('pick').value=hexv;document.getElementById('hex').value=hexv.slice(1);render(hexv);}
document.getElementById('pick').addEventListener('input',e=>setP(e.target.value));
document.getElementById('hex').addEventListener('input',e=>{const v=e.target.value.replace(/[^0-9a-fA-F]/g,'').slice(0,6);if(v.length===6)setP('#'+v);});
document.getElementById('chips').addEventListener('click',e=>{const s=e.target.closest('.chip');if(s)setP(s.dataset.c);});
document.querySelectorAll('.copy').forEach(b=>b.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(cur[b.dataset.t]);b.textContent='Copied';setTimeout(()=>b.textContent='Copy',1100);});
document.getElementById('theme').onclick=()=>{const d=document.documentElement;d.dataset.theme=d.dataset.theme==='dark'?'light':'dark';};
render('#2D567C');
</script>
</body>
</html>
