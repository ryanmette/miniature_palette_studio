<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Experience flows — Palette Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root,[data-theme="light"]{--bg:#FBFBFE;--surface:#FFFFFF;--s2:#F1F2FF;--border:#E6E7F8;--bstrong:#D3D5F0;--text:#20223A;--muted:#6E7293;--faint:#A2A6C4;--accent:#7C3AED;--accent-weak:#F0EAFE;--on-accent:#FFF;--success:#16A34A;--warning:#C2740B;--danger:#DC2647;--r-card:14px;--r-ctrl:10px;--shadow:0 1px 2px rgba(60,50,120,.06),0 6px 18px rgba(60,50,120,.05);}
  [data-theme="dark"]{--bg:#141110;--surface:#1C1815;--s2:#251F1A;--border:#3A302A;--bstrong:#4D4138;--text:#ECE3D8;--muted:#A8998A;--faint:#7C6F62;--accent:#C2912F;--accent-weak:#2C2113;--on-accent:#15100A;--success:#86A559;--warning:#C9923A;--danger:#D2563F;--shadow:0 1px 2px rgba(0,0,0,.45);}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:14px;transition:background .2s,color .2s}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:18px;margin:0}
  .mono{font-family:ui-monospace,Menlo,monospace}
  .bar{display:flex;align-items:center;gap:10px;padding:14px 22px;border-bottom:1px solid var(--border);max-width:1160px;margin:0 auto}
  .mark{width:26px;height:26px;border-radius:8px;background:var(--accent);color:var(--on-accent);display:grid;place-items:center;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:15px}
  .sub{color:var(--faint);font-weight:500;font-size:13px}
  .spacer{flex:1}
  .icon{height:34px;width:34px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--r-ctrl);cursor:pointer}
  main{max-width:1160px;margin:0 auto;padding:20px 22px 48px}
  .personas{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:8px}
  .pcard{text-align:left;border:1px solid var(--border);background:var(--surface);border-radius:var(--r-card);padding:12px 14px;cursor:pointer;transition:border-color .12s,background .12s}
  .pcard:hover{border-color:var(--bstrong)}
  .pcard[aria-pressed=true]{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-weak)}
  .pcard .nm{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px}
  .pcard .ro{font-size:11.5px;color:var(--muted);margin-top:1px}
  .jtbd{background:var(--s2);border-radius:var(--r-ctrl);padding:12px 14px;margin:14px 0 6px;font-size:14px;line-height:1.5}
  .jtbd b{color:var(--accent)}
  .flow{display:flex;gap:8px;align-items:stretch;overflow-x:auto;padding:14px 0 6px}
  .step{flex:0 0 200px;display:flex;flex-direction:column;animation:rise .4s cubic-bezier(.2,.7,.2,1) both}
  .step:nth-child(3){animation-delay:.06s}.step:nth-child(5){animation-delay:.12s}.step:nth-child(7){animation-delay:.18s}.step:nth-child(9){animation-delay:.24s}
  .screen{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);box-shadow:var(--shadow);padding:12px;min-height:150px;display:flex;flex-direction:column;justify-content:center;gap:8px}
  .cap{margin-top:9px;font-size:12.5px;color:var(--text);line-height:1.4;display:flex;gap:7px}
  .num{flex:none;width:18px;height:18px;border-radius:50%;background:var(--accent);color:var(--on-accent);font-size:11px;font-weight:600;display:grid;place-items:center;font-family:ui-monospace,monospace}
  .arrow{align-self:center;color:var(--faint);font-size:18px;flex:none}
  .outcome{margin-top:16px;display:inline-flex;align-items:center;gap:8px;background:var(--accent-weak);color:var(--accent);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:500}
  /* mini-ui bits */
  .sw{border-radius:7px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.16);flex:none}
  .field{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0 8px;height:30px;font-family:ui-monospace,monospace;font-size:12px;color:var(--text)}
  .seg{display:inline-flex;background:var(--s2);border-radius:8px;padding:2px;gap:2px;font-size:10.5px}
  .seg span{padding:3px 7px;border-radius:6px;color:var(--muted)}
  .seg span.on{background:var(--surface);color:var(--text);font-weight:600}
  .ir{display:flex;align-items:center;gap:6px}
  .ir .nm{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-family:ui-monospace,monospace;font-size:10px;padding:1px 5px;border-radius:5px;background:var(--s2);margin-left:auto;flex:none}
  .pill{font-size:11px;background:var(--s2);border-radius:999px;padding:4px 9px;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  .btnp{background:var(--accent);color:var(--on-accent);border-radius:8px;padding:5px 10px;font-size:11.5px;font-weight:500;text-align:center}
  .lab{font-size:10px;color:var(--faint);width:54px;flex:none}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="bar"><span class="mark">P</span><h1>Palette Studio <span class="sub">· experience flows</span></h1><div class="spacer"></div><button class="icon" id="theme" aria-label="Toggle theme">◐</button></div>
<main>
  <div class="personas" id="personas"></div>
  <div class="jtbd" id="jtbd"></div>
  <div class="flow" id="flow"></div>
  <div id="outcome"></div>
</main>
<script>
const hx=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
const xh=a=>'#'+a.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('').toUpperCase();
const lin=c=>{c/=255;return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);};
const ulin=c=>{c=c<=0.0031308?12.92*c:1.055*Math.pow(c,1/2.4)-0.055;return c*255;};
const r2h=([r,g,b])=>{r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn)h=s=0;else{const d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);h=mx===r?(g-b)/d+(g<b?6:0):mx===g?(b-r)/d+2:(r-g)/d+4;h/=6;}return[h*360,s,l];};
const h2h=(h,s,l)=>{h=(h%360+360)%360;const C=(1-Math.abs(2*l-1))*s,X=C*(1-Math.abs((h/60)%2-1)),m=l-C/2;let a;if(h<60)a=[C,X,0];else if(h<120)a=[X,C,0];else if(h<180)a=[0,C,X];else if(h<240)a=[0,X,C];else if(h<300)a=[X,0,C];else a=[C,0,X];return xh([(a[0]+m)*255,(a[1]+m)*255,(a[2]+m)*255]);};
const rotc=(c,d)=>{const[h,s,l]=r2h(hx(c));return h2h(h+d,s,l);};
const comp=c=>rotc(c,180);
function lab([r,g,b]){const R=lin(r),G=lin(g),B=lin(b);const x=(R*0.4124+G*0.3576+B*0.1805)/0.95047,y=R*0.2126+G*0.7152+B*0.0722,z=(R*0.0193+G*0.1192+B*0.9505)/1.08883;const f=t=>t>Math.pow(6/29,3)?Math.cbrt(t):t/(3*Math.pow(6/29,2))+4/29;return[116*f(y)-16,500*(f(x)-f(y)),200*(f(y)-f(z))];}
function dE(l1,l2){const[L1,a1,b1]=l1,[L2,a2,b2]=l2,r=Math.PI/180,d=180/Math.PI;const C1=Math.hypot(a1,b1),C2=Math.hypot(a2,b2),Cb=(C1+C2)/2,Cb7=Math.pow(Cb,7),G=0.5*(1-Math.sqrt(Cb7/(Cb7+Math.pow(25,7))));const A1=(1+G)*a1,A2=(1+G)*a2,P1=Math.hypot(A1,b1),P2=Math.hypot(A2,b2);let h1=Math.atan2(b1,A1);if(h1<0)h1+=2*Math.PI;let h2=Math.atan2(b2,A2);if(h2<0)h2+=2*Math.PI;const dL=L2-L1,dC=P2-P1;let dh=0;if(P1*P2!==0){dh=h2-h1;if(dh>Math.PI)dh-=2*Math.PI;else if(dh<-Math.PI)dh+=2*Math.PI;}const dH=2*Math.sqrt(P1*P2)*Math.sin(dh/2),Lb=(L1+L2)/2,Pb=(P1+P2)/2;let hb;if(P1*P2===0)hb=h1+h2;else hb=(Math.abs(h1-h2)>Math.PI)?(h1+h2+2*Math.PI)/2:(h1+h2)/2;const T=1-0.17*Math.cos(hb-30*r)+0.24*Math.cos(2*hb)+0.32*Math.cos(3*hb+6*r)-0.2*Math.cos(4*hb-63*r);const dT=30*r*Math.exp(-Math.pow((hb*d-275)/25,2)),Pb7=Math.pow(Pb,7),Rc=2*Math.sqrt(Pb7/(Pb7+Math.pow(25,7))),Sl=1+0.015*Math.pow(Lb-50,2)/Math.sqrt(20+Math.pow(Lb-50,2)),Sc=1+0.045*Pb,Sh=1+0.015*Pb*T,Rt=-Math.sin(2*dT)*Rc;return Math.sqrt((dL/Sl)**2+(dC/Sc)**2+(dH/Sh)**2+Rt*(dC/Sc)*(dH/Sh));}
const sim=(c,t)=>{const M={protan:[[0.152286,1.052583,-0.204868],[0.114503,0.786281,0.099216],[-0.003882,-0.048116,1.051998]],deuter:[[0.367322,0.860646,-0.227968],[0.280085,0.672501,0.047413],[-0.011820,0.042940,0.968881]]}[t];const[r,g,b]=hx(c).map(lin);return xh([M[0][0]*r+M[0][1]*g+M[0][2]*b,M[1][0]*r+M[1][1]*g+M[1][2]*b,M[2][0]*r+M[2][1]*g+M[2][2]*b].map(v=>ulin(Math.max(0,Math.min(1,v)))));};
const POOL=[["Mephiston Red","Citadel","#9A1115"],["Evil Sunz Scarlet","Citadel","#C21920"],["Troll Slayer Orange","Citadel","#F46C2E"],["Averland Sunset","Citadel","#FCB41D"],["Yriel Yellow","Citadel","#FFCE00"],["Moot Green","Citadel","#A5D610"],["Warpstone Glow","Citadel","#106B21"],["Caliban Green","Citadel","#005221"],["Sotek Green","Citadel","#006B5A"],["Teclis Blue","Citadel","#8BB9DD"],["Caledor Sky","Citadel","#31639C"],["Macragge Blue","Citadel","#2D567C"],["Naggaroth Night","Citadel","#562F7E"],["Screamer Pink","Citadel","#9C0E4E"],["Bugman's Glow","Citadel","#A95C3E"],["Auric Armour Gold","Citadel","#C8A13A"],["Runefang Steel","Citadel","#B5B5BD"],["Magic Blue","Vallejo Game","#2F66A2"],["Imperial Blue","Vallejo Game","#28507A"],["Deep Blue","Army Painter","#0B0E60"],["Crystal Blue","Army Painter","#3E6FA8"],["Gory Red","Vallejo Game","#A01418"],["Mythical Orange","Army Painter","#F36A26"]];
const PL=POOL.map(p=>lab(hx(p[2])));
const near=(c,filter)=>{const t=lab(hx(c));let bi=-1,bd=1e9;for(let i=0;i<POOL.length;i++){if(filter&&!filter(POOL[i]))continue;const d=dE(t,PL[i]);if(d<bd){bd=d;bi=i;}}return{p:POOL[bi],d:bd};};
const txt=c=>{const[r,g,b]=hx(c).map(lin);return 0.2126*r+0.7152*g+0.0722*b>0.4?'#15150F':'#FFFFFF';};
const qcol=d=>d<=2?'var(--success)':d<=5?'var(--success)':d<=10?'var(--warning)':'var(--danger)';

const sw=(c,s)=>`<span class="sw" style="width:${s}px;height:${s}px;background:${c}"></span>`;
function ideaRow(ideal){const m=near(ideal);return `<div class="ir">${sw(ideal,22)}<span style="color:var(--faint)">→</span>${sw(m.p[2],22)}<span class="nm">${m.p[0]}</span><span class="badge" style="color:${qcol(m.d)}">ΔE ${m.d.toFixed(1)}</span></div>`;}
function wheelSVG(base,offs,drag){const cx=42,cy=38,R=28;let g=`<svg width="84" height="76" viewBox="0 0 84 76">`;for(let a=0;a<360;a+=10){const a0=a*Math.PI/180;g+=`<circle cx="${cx+Math.sin(a0)*R}" cy="${cy-Math.cos(a0)*R}" r="2" fill="${h2h(a,0.6,0.55)}" opacity="0.5"/>`;}const ns=[0,...offs];ns.forEach((o,i)=>{const[h]=r2h(hx(rotc(base,o)));const a0=h*Math.PI/180,x=cx+Math.sin(a0)*R,y=cy-Math.cos(a0)*R;g+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--border)" stroke-width="1"/><circle cx="${x}" cy="${y}" r="${i===0&&drag?7:5}" fill="${rotc(base,o)}" stroke="#fff" stroke-width="${i===0&&drag?2.5:1.5}"/>`;});g+=`</svg>`;return g;}
function chip(name,brand,c,d){return `<div class="ir">${sw(c,20)}<div style="min-width:0"><div class="nm">${name}</div><div style="font-size:9.5px;color:var(--faint)">${brand}</div></div><span class="badge" style="color:${qcol(d)}">ΔE ${d.toFixed(1)}</span></div>`;}
function cvdRow(label,c){return `<div class="ir"><span class="lab">${label}</span>${c.map(x=>`<span class="sw" style="flex:1;height:16px;background:${x}"></span>`).join('')}</div>`;}

const blue='#2D567C', roles=[blue,rotc(blue,30),rotc(blue,180),'#C8A13A'];
const FLOWS={
 priya:{nm:'Priya — Scheme Planner',ro:'has a model + a colour in mind',jtbd:'“I’ve picked my armour colour. Build a cohesive scheme and tell me the <b>real paints to buy</b>.”',out:'A buyable, role-mapped scheme + shopping list',
  steps:[
   {cap:'Enters her main / body colour',ui:()=>`<div class="lab" style="width:auto">Main colour</div><div style="display:flex;gap:8px;align-items:center">${sw(blue,40)}<div class="field">#2D567C</div></div>`},
   {cap:'Picks a harmony',ui:()=>`<div class="seg"><span class="on">Comp</span><span>Triad</span><span>Split</span></div>${wheelSVG(blue,[180])}`},
   {cap:'Gets a role-mapped scheme — ideal → nearest real paint',ui:()=>['Body','Secondary','Accent','Metal'].map((r,i)=>`<div style="font-size:9px;color:var(--faint);margin-bottom:-3px">${r}</div>${ideaRow(roles[i])}`).join('')},
   {cap:'Each slot gets a derived wash + highlight',ui:()=>`<div class="lab" style="width:auto">Body ladder</div><div style="display:flex;gap:6px">${sw(rotc('#2D567C',0),0)}<div style="text-align:center"><div class="sw" style="width:34px;height:26px;background:#1E3A55"></div><div style="font-size:9px;color:var(--faint)">wash</div></div><div style="text-align:center"><div class="sw" style="width:34px;height:26px;background:${blue}"></div><div style="font-size:9px;color:var(--faint)">base</div></div><div style="text-align:center"><div class="sw" style="width:34px;height:26px;background:#5E86B0"></div><div style="font-size:9px;color:var(--faint)">hi-lite</div></div></div>`},
   {cap:'Exports the shopping list',ui:()=>`${['Macragge Blue','Caledor Sky','Mythical Orange','Auric Gold'].map(n=>`<div class="ir">${sw(roles[0],14)}<span class="nm">${n}</span></div>`).join('')}<div class="btnp">Export list</div>`}
  ]},
 sam:{nm:'Sam — Explorer',ro:'no fixed goal, here to tinker',jtbd:'“Let me <b>drag colours around</b> and watch the scheme shift live until something clicks — then save it.”',out:'A discovered palette, saved + shareable',
  steps:[
   {cap:'Opens Explore — the live wheel',ui:()=>wheelSVG('#106B21',[120,240],true)},
   {cap:'Drags the base node — the scheme shifts in real time',ui:()=>`${wheelSVG('#1D9E4A',[120,240],true)}<div class="pill" style="align-self:center"><span>drag</span> hue + saturation</div>`},
   {cap:'Locks a colour, shuffles the rest',ui:()=>`${wheelSVG('#1D9E4A',[110,250],true)}<div class="pill" style="align-self:center">🔒 lock · ↻ shuffle</div>`},
   {cap:'Saves the find — shareable URL',ui:()=>`<div style="display:flex;gap:5px">${['#1D9E4A','#9E1D71','#9E711D'].map(c=>sw(c,30)).join('')}</div><div class="field mono" style="font-size:10px">…/?p=1D9E4A,9E1D71</div><div class="btnp">↗ Share</div>`}
  ]},
 marcus:{nm:'Marcus — Range Switcher',ro:'has a recipe in another brand',jtbd:'“My recipe calls for a discontinued paint — give me the <b>closest one I can buy today</b>.”',out:'The nearest current paint, with the honest gap',
  steps:[
   {cap:'Looks up the paint he has (discontinued)',ui:()=>`<div class="ir">${sw('#2D567C',26)}<div><div class="nm">Mordian Blue</div><div style="font-size:9.5px;color:var(--danger)">discontinued</div></div></div>`},
   {cap:'Sees cross-brand equivalents by ΔE',ui:()=>{const others=POOL.filter(p=>p[1]!=='Citadel').map(p=>({p,d:dE(lab(hx('#2D567C')),lab(hx(p[2])))})).sort((a,b)=>a.d-b.d).slice(0,3);return others.map(o=>chip(o.p[0],o.p[1],o.p[2],o.d)).join('');}},
   {cap:'Picks the closest available brand',ui:()=>{const o=near('#2D567C',p=>p[1]==='Vallejo Game');return `${chip(o.p[0],o.p[1],o.p[2],o.d)}<div class="btnp">Use this paint</div>`;}},
   {cap:'Builds a scheme from it if he likes',ui:()=>`<div style="display:flex;gap:5px">${roles.map(c=>sw(c,26)).join('')}</div><div style="font-size:10px;color:var(--faint)">same engine, his paint</div>`}
  ]},
 dana:{nm:'Dana — Inclusive / Legibility',ro:'paints for a group or display',jtbd:'“Confirm my scheme still <b>reads for colour-blind viewers</b> and has enough contrast.”',out:'A scheme that reads for everyone',
  steps:[
   {cap:'Has a built scheme',ui:()=>`<div style="display:flex;gap:5px">${roles.map(c=>sw(c,28)).join('')}</div>`},
   {cap:'Opens Accessibility — colour-blindness sim',ui:()=>`${cvdRow('Normal',roles)}${cvdRow('Deuteran',roles.map(c=>sim(c,'deuter')))}${cvdRow('Protan',roles.map(c=>sim(c,'protan')))}`},
   {cap:'A collision gets flagged',ui:()=>`<div class="ir">${sw(sim(roles[0],'deuter'),22)}${sw(sim(roles[3],'deuter'),22)}<span class="nm" style="color:var(--danger)">Body ↔ Metal merge</span></div>`},
   {cap:'Gets a safe-swap + contrast check',ui:()=>`<div class="ir">${sw('#C8A13A',22)}<span style="color:var(--faint)">→</span>${sw('#7C8286',22)}<span class="nm">swap metal</span></div><div class="pill" style="color:var(--success)">contrast 4.8:1 · passes AA</div>`}
  ]},
 quinn:{nm:'Quinn — Quick complement',ro:'already has a primary',jtbd:'“Just show me the <b>exact complement</b> of this colour and the paint to buy — nothing else.”',out:'Two colours, instantly',
  steps:[
   {cap:'Enters the primary',ui:()=>`<div style="display:flex;gap:8px;align-items:center">${sw('#9A1115',40)}<div class="field">#9A1115</div></div>`},
   {cap:'Sees the exact complement (180°)',ui:()=>`<div style="display:flex;gap:8px;align-items:center">${sw('#9A1115',46)}<span style="color:var(--faint)" class="mono">180°</span>${sw(comp('#9A1115'),46)}</div><div class="mono" style="font-size:11px;color:var(--muted)">${comp('#9A1115')}</div>`},
   {cap:'Nearest real paint for the complement',ui:()=>{const m=near(comp('#9A1115'));return chip(m.p[0],m.p[1],m.p[2],m.d);}},
   {cap:'Copies the hex — done',ui:()=>`<div class="ir">${sw(comp('#9A1115'),26)}<span class="mono nm">${comp('#9A1115')}</span><span class="pill" style="color:var(--success);margin-left:auto">Copied ✓</span></div>`}
  ]}
};
const ORDER=['priya','sam','marcus','dana','quinn'];
let cur='priya';
document.getElementById('personas').innerHTML=ORDER.map(k=>{const f=FLOWS[k];return `<button class="pcard" data-k="${k}" aria-pressed="${k===cur}"><div class="nm">${f.nm.split(' — ')[0]}</div><div class="ro">${f.nm.split(' — ')[1]} · ${f.ro}</div></button>`;}).join('');
function render(){const f=FLOWS[cur];
  document.getElementById('jtbd').innerHTML=f.jtbd;
  let h='';f.steps.forEach((s,i)=>{if(i)h+=`<div class="arrow">→</div>`;h+=`<div class="step"><div class="screen">${s.ui()}</div><div class="cap"><span class="num">${i+1}</span><span>${s.cap}</span></div></div>`;});
  document.getElementById('flow').innerHTML=h;
  document.getElementById('outcome').innerHTML=`<div class="outcome">✓ ${f.out}</div>`;
  document.querySelectorAll('.pcard').forEach(b=>b.setAttribute('aria-pressed',b.dataset.k===cur));
}
document.getElementById('personas').addEventListener('click',e=>{const b=e.target.closest('.pcard');if(b){cur=b.dataset.k;render();}});
document.getElementById('theme').onclick=()=>{const d=document.documentElement;d.dataset.theme=d.dataset.theme==='dark'?'light':'dark';};
render();
</script>
</body>
</html>
