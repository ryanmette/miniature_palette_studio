<!DOCTYPE html>
<html lang="en" data-theme="grim">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Palette Studio loader — drop · wheel · wells</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root,[data-theme="light"]{--bg:#FBFBFE;--surface:#FFFFFF;--s2:#F1F2FF;--border:#E6E7F8;--bstrong:#D3D5F0;--text:#20223A;--muted:#6E7293;--faint:#A2A6C4;--accent:#7C3AED;--accent-weak:#F0EAFE;--on-accent:#FFF;--r-card:14px;--r-ctrl:10px;}
  [data-theme="grim"]{--bg:#141110;--surface:#1C1815;--s2:#251F1A;--border:#3A302A;--bstrong:#4D4138;--text:#ECE3D8;--muted:#A8998A;--faint:#7C6F62;--accent:#C2912F;--accent-weak:#2C2113;--on-accent:#15100A;}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:14px;transition:background .2s,color .2s}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:20px;margin:0}
  .sub{color:var(--muted);font-size:12.5px;margin:4px 0 0}
  .wrap{display:flex;gap:18px;padding:18px;min-height:100vh}
  .side{width:290px;flex:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:18px;align-self:flex-start;position:sticky;top:18px}
  .sec{margin-top:18px}
  .sec h3{font-family:"Space Grotesk",sans-serif;font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:0 0 10px}
  .seg{display:flex;background:var(--s2);border-radius:var(--r-ctrl);padding:3px;gap:3px;flex-wrap:wrap}
  .seg button{flex:1;border:none;background:transparent;color:var(--muted);height:30px;min-width:42px;border-radius:7px;font-weight:600;font-size:12px;font-family:"Space Grotesk",sans-serif;cursor:pointer}
  .seg button[aria-pressed=true]{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .row{display:flex;gap:8px;margin-bottom:8px}
  .btn{flex:1;height:36px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--r-ctrl);font-weight:500;font-size:13px;cursor:pointer}
  .btn:hover{border-color:var(--bstrong);background:var(--s2)}
  .btn.acc{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
  input[type=number]{width:100%;height:36px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-ctrl);color:var(--text);font-family:ui-monospace,monospace;text-align:center;font-size:14px;margin-bottom:8px}
  .ctl{margin-bottom:8px}.ctl label{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-bottom:6px}
  .ctl label b{color:var(--text);font-weight:500;font-family:ui-monospace,monospace}
  input[type=range]{width:100%;accent-color:var(--accent)}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-width:0}
  .frame{width:100%;max-width:520px;aspect-ratio:1/1;border-radius:var(--r-card);overflow:hidden;border:1px solid var(--border);background:var(--bg)}
  canvas{display:block;width:100%;height:100%}
  .cap{font-family:"Space Grotesk",sans-serif;font-size:13.5px;letter-spacing:.03em;color:var(--muted);height:18px}
  .transport{display:flex;align-items:center;gap:10px;width:100%;max-width:520px}
  .note{color:var(--faint);font-size:11.5px;line-height:1.5;margin-top:8px}
  @media(max-width:760px){.wrap{flex-direction:column}.side{width:100%;position:static}}
</style>
</head>
<body>
<div class="wrap">
  <aside class="side">
    <h1>Palette loader</h1>
    <p class="sub">Drop → wheel → wells · determinate · themed</p>

    <div class="sec"><h3>Theme</h3>
      <div class="seg" id="theme"><button data-t="grim" aria-pressed="true">Grimdark</button><button data-t="light" aria-pressed="false">Playful</button></div></div>
    <div class="sec"><h3>Palette seed</h3>
      <input type="number" id="seed" value="7" min="1" />
      <div class="row"><button class="btn" id="prev">← Prev</button><button class="btn" id="next">Next →</button></div>
      <button class="btn acc" id="rand" style="width:100%">↻ Random palette</button></div>
    <div class="sec"><h3>Harmony</h3>
      <div class="seg" id="harm"><button data-h="complementary" aria-pressed="true">Comp</button><button data-h="triadic" aria-pressed="false">Triad</button><button data-h="split" aria-pressed="false">Split</button><button data-h="tetradic" aria-pressed="false">Tetra</button></div></div>
    <div class="sec"><h3>Swatches</h3>
      <div class="seg" id="count"><button data-c="3" aria-pressed="true">3</button><button data-c="4" aria-pressed="false">4</button><button data-c="5" aria-pressed="false">5</button></div></div>
    <div class="sec"><h3>Timing</h3>
      <div class="ctl"><label>Speed <b id="vspeed">1.0×</b></label><input type="range" id="speed" min="0.5" max="2" step="0.1" value="1"></div></div>
    <div class="sec"><h3>Actions</h3>
      <button class="btn" id="png" style="width:100%;margin-bottom:8px">Download finished frame</button>
      <p class="note">Determinate — in the app this maps to real load progress. Honours <code>prefers-reduced-motion</code> (shows the finished palette). Vanilla canvas, no runtime dependency.</p></div>
  </aside>

  <main class="stage">
    <div class="frame"><canvas id="c" width="600" height="600" role="img" aria-label="Palette loading animation"></canvas></div>
    <div class="cap" id="cap"></div>
    <div class="transport">
      <button class="btn" id="play" style="flex:none;width:46px;font-size:15px">❚❚</button>
      <input type="range" id="scrub" min="0" max="100" value="0" aria-label="Progress" style="flex:1">
      <button class="btn" id="restart" style="flex:none;width:80px">Restart</button>
    </div>
  </main>
</div>

<script>
const hx=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
const xh=a=>'#'+a.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
const r2h=([r,g,b])=>{r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn)h=s=0;else{const d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);h=mx===r?(g-b)/d+(g<b?6:0):mx===g?(b-r)/d+2:(r-g)/d+4;h/=6;}return[h*360,s,l];};
const h2h=(h,s,l)=>{h=(h%360+360)%360;const C=(1-Math.abs(2*l-1))*s,X=C*(1-Math.abs((h/60)%2-1)),m=l-C/2;let a;if(h<60)a=[C,X,0];else if(h<120)a=[X,C,0];else if(h<180)a=[0,C,X];else if(h<240)a=[0,X,C];else if(h<300)a=[X,0,C];else a=[C,0,X];return xh([(a[0]+m)*255,(a[1]+m)*255,(a[2]+m)*255]);};
const rot=(c,d)=>{const[h,s,l]=r2h(hx(c));return h2h(h+d,s,l);};
const adj=(c,dl,ds)=>{let[h,s,l]=r2h(hx(c));return h2h(h,Math.max(0,Math.min(1,s+ds)),Math.max(0,Math.min(1,l+dl)));};
const cl=x=>Math.max(0,Math.min(1,x)),eIO=t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2,eOC=t=>1-Math.pow(1-t,3),lerp=(a,b,t)=>a+(b-a)*t;
function rr(c,X,Y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(X+r,Y);c.arcTo(X+w,Y,X+w,Y+h,r);c.arcTo(X+w,Y+h,X,Y+h,r);c.arcTo(X,Y+h,X,Y,r);c.arcTo(X,Y,X+w,Y,r);c.closePath();}
const HARM={complementary:[30,180],triadic:[120,240],split:[150,210],tetradic:[90,180]};
const THEMES={grim:{k:'grim',bg:'#141110',ring:'rgba(236,227,216,.16)',text:'#A8998A',accent:'#C2912F',well:'#251F1A',glow:'lighter'},light:{k:'light',bg:'#FBFBFE',ring:'rgba(32,34,58,.12)',text:'#6E7293',accent:'#7C3AED',well:'#EDEEFB',glow:'source-over'}};
function buildRoles(seed,harmony,count){const base=h2h((seed*47)%360,0.8,0.36),o=HARM[harmony];
  return [{n:'Body',hex:base},{n:'2nd',hex:rot(base,o[0])},{n:'Accent',hex:rot(base,o[1])},{n:'Metal',hex:'#C8A13A'},{n:'Hi',hex:adj(base,0.28,-0.10)}].slice(0,count).map(r=>({...r,hue:r2h(hx(r.hex))[0]}));}

/* ── core: deterministic frame for a given progress (the shippable part) ──── */
function createPaletteLoader(canvas){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  let roles=buildRoles(7,'complementary',3), T=THEMES.grim;
  function render(p){
    const cx=W/2,cy=H*0.30,R=Math.min(W,H)*0.20,n=roles.length,gap=W*0.04,box=Math.min(H*0.16,(W*0.84-(n-1)*gap)/n),rowW=n*box+(n-1)*gap,sx=(W-rowW)/2,wy=H*0.66;
    ctx.fillStyle=T.bg;ctx.fillRect(0,0,W,H);
    const ringP=eIO(cl((p-0.16)/0.26)), wheelFade=1-cl((p-0.52)/0.16), ringL=T.k==='grim'?0.5:0.6;
    if(p<0.12){const dy=lerp(-W*0.04,cy,eIO(cl(p/0.12)));ctx.fillStyle=roles[0].hex;ctx.beginPath();ctx.arc(cx,dy,W*0.018,0,7);ctx.fill();}
    const bl=cl((p-0.10)/0.20);
    if(p>=0.08&&p<0.34){ctx.globalCompositeOperation=T.glow;for(let k=0;k<n;k++){ctx.globalAlpha=(1-bl)*0.5;ctx.strokeStyle=roles[k].hex;ctx.lineWidth=4;ctx.beginPath();ctx.arc(cx,cy,bl*(W*0.045+k*W*0.024),0,7);ctx.stroke();}ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';}
    if(ringP>0&&wheelFade>0.02){ctx.lineWidth=5;ctx.globalAlpha=0.26*wheelFade;for(let a=0;a<360;a+=6){if(a>360*ringP)break;const a0=a*Math.PI/180;ctx.strokeStyle=h2h(a,0.5,ringL);ctx.beginPath();ctx.arc(cx,cy,R,a0-0.06,a0+0.06);ctx.stroke();}ctx.globalAlpha=1;}
    const hold=cl((p-0.42)/0.10), pulse=1+0.12*Math.sin(hold*Math.PI);
    for(let i=0;i<n;i++){
      const hue=roles[i].hue, wxp=cx+Math.sin(hue*Math.PI/180)*R, wyp=cy-Math.cos(hue*Math.PI/180)*R;
      const gatherT=eIO(cl((p-0.16-i*0.02)/0.26));
      const wellStart=0.52+i*0.055, travelDur=0.10, morphStart=wellStart+travelDur, morphDur=0.16;
      const slotX=sx+i*(box+gap)+box/2, wx0=slotX-box/2, bottomY=wy+box, dotR=box*0.16, cor=box*0.18;
      if(p>=wellStart-0.05){ctx.fillStyle=T.well;rr(ctx,wx0,wy,box,box,cor);ctx.fill();ctx.lineWidth=1.2;ctx.strokeStyle=T.ring;rr(ctx,wx0,wy,box,box,cor);ctx.stroke();}
      if(p<morphStart){
        let nx,ny,halo,pr;
        if(p<wellStart){nx=lerp(cx,wxp,gatherT);ny=lerp(cy,wyp,gatherT);halo=0.5;pr=pulse;}
        else{const tt=eIO(cl((p-wellStart)/travelDur));nx=lerp(wxp,slotX,tt);ny=lerp(wyp,bottomY-dotR-1,tt);halo=0.5*(1-tt);pr=1;}
        if(T.k==='grim'&&halo>0.02){ctx.globalCompositeOperation='lighter';ctx.globalAlpha=halo;ctx.fillStyle=roles[i].hex;ctx.beginPath();ctx.arc(nx,ny,dotR*1.8*pr,0,7);ctx.fill();ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';}
        ctx.fillStyle=roles[i].hex;ctx.beginPath();ctx.arc(nx,ny,dotR*pr,0,7);ctx.fill();
      } else {
        const prog=cl((p-morphStart)/morphDur), g=eOC(prog);
        const size=lerp(dotR*2,box,g), cr=lerp(size/2,cor,g), sxf=1+0.08*Math.sin(prog*Math.PI), syf=1-0.10*Math.sin(prog*Math.PI);
        const w2=size*sxf,h2=size*syf,x=slotX-w2/2,y=bottomY-h2;
        ctx.save();rr(ctx,wx0,wy,box,box,cor);ctx.clip();ctx.fillStyle=roles[i].hex;rr(ctx,x,y,w2,h2,cr);ctx.fill();ctx.restore();
        ctx.lineWidth=1.2;ctx.strokeStyle=T.ring;rr(ctx,wx0,wy,box,box,cor);ctx.stroke();
        const la=cl((prog-0.6)/0.4);if(la>0){ctx.globalAlpha=la;ctx.fillStyle=T.text;ctx.font='500 '+Math.round(W*0.026)+'px Inter,sans-serif';ctx.textAlign='center';ctx.fillText(roles[i].n,slotX,wy+box+W*0.05);ctx.globalAlpha=1;}
      }
    }
    ctx.fillStyle=T.ring;rr(ctx,W*0.08,H*0.93,W*0.84,4,2);ctx.fill();ctx.fillStyle=T.accent;rr(ctx,W*0.08,H*0.93,W*0.84*cl(p),4,2);ctx.fill();
  }
  return {render,
    setTheme(t){T=THEMES[t];render(lastP);},
    rebuild(seed,harmony,count){roles=buildRoles(seed,harmony,count);render(lastP);},
    get roles(){return roles;}};
}

/* ── explorer wiring ─────────────────────────────────────────────────────── */
const cv=document.getElementById('c'); let L=createPaletteLoader(cv);
let seed=7,harmony='complementary',count=3,speed=1,theme='grim',p=0,playing=true,last=performance.now(),lastP=0;
const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const $=id=>document.getElementById(id);
const CAPS=[[0.12,'A drop of colour'],[0.52,'Finding harmonies'],[0.96,'Filling the wells'],[2,'Palette ready ✓']];
const cap=p=>{for(const[t,s] of CAPS)if(p<t)return s;return'Palette ready ✓';};
function frame(now){const dt=(now-last)/1000;last=now;if(playing){p+=dt/(2.8/speed);if(p>=1+1.2/(2.8/speed))p=0;}lastP=Math.min(p,1);L.render(lastP);$('scrub').value=Math.round(lastP*100);$('cap').textContent=cap(lastP);requestAnimationFrame(frame);}
if(reduce){playing=false;p=1;lastP=1;L.render(1);$('cap').textContent='Palette ready ✓';$('play').textContent='▶';}
requestAnimationFrame(frame);
$('play').onclick=()=>{playing=!playing;$('play').textContent=playing?'❚❚':'▶';if(playing){if(p>=1)p=0;last=performance.now();}};
$('restart').onclick=()=>{p=0;playing=true;$('play').textContent='❚❚';last=performance.now();};
$('scrub').addEventListener('input',e=>{playing=false;$('play').textContent='▶';p=e.target.value/100;});
function setTheme(t){theme=t;document.documentElement.dataset.theme=t;L.setTheme(t);document.querySelectorAll('#theme button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.t===t));}
$('theme').addEventListener('click',e=>{const b=e.target.closest('button');if(b)setTheme(b.dataset.t);});
$('harm').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;harmony=b.dataset.h;document.querySelectorAll('#harm button').forEach(x=>x.setAttribute('aria-pressed',x===b));L.rebuild(seed,harmony,count);});
$('count').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;count=+b.dataset.c;document.querySelectorAll('#count button').forEach(x=>x.setAttribute('aria-pressed',x===b));L.rebuild(seed,harmony,count);});
function setSeed(s){seed=Math.max(1,s|0);$('seed').value=seed;L.rebuild(seed,harmony,count);}
$('seed').addEventListener('change',()=>setSeed(parseInt($('seed').value)||1));
$('prev').onclick=()=>setSeed(seed-1);$('next').onclick=()=>setSeed(seed+1);$('rand').onclick=()=>setSeed(Math.floor(Math.random()*9999)+1);
$('speed').addEventListener('input',e=>{speed=parseFloat(e.target.value);$('vspeed').textContent=speed.toFixed(1)+'×';});
$('png').onclick=()=>{const keep=p;L.render(1);const a=document.createElement('a');a.download='palette-loader.png';a.href=cv.toDataURL('image/png');a.click();L.render(Math.min(keep,1));};
</script>
</body>
</html>
