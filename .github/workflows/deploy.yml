name: Deploy to GitHub Pages

# Publishes the static app in src/ to GitHub Pages on every push to main.
# One-time setup: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload the app (src/ is the site root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
