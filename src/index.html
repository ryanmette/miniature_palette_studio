<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Palette Studio for Miniatures</title>
<meta name="description" content="Pick a miniature paint and get colour harmonies matched to the real paints you can buy." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/tokens.css" />
<link rel="stylesheet" href="styles/app.css" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<meta name="theme-color" content="#141110" />
</head>
<body>
<header>
  <div class="bar">
    <div class="logo"><span class="mark">P</span><span class="t">Palette Studio<small data-i18n="tagline">for miniatures</small></span></div>
    <div class="spacer"></div>
    <div class="hexin" title="Type any hex to seed a scheme"><span>#</span><input id="hex" maxlength="6" inputmode="text" aria-label="Hex colour" /></div>
    <div class="seg" id="seedRole" role="group" aria-label="Seed role">
      <button data-role="main" aria-pressed="true">Main</button>
      <button data-role="accent" aria-pressed="false">Accent</button>
    </div>
    <button class="btn" id="owned" aria-pressed="false" title="Match only paints you own">Owned</button>
    <button class="btn" id="compare" aria-pressed="false" title="Pin this scheme, then compare">Compare</button>
    <button class="btn primary" id="export" title="Export the shopping list">Export</button>
    <button class="btn" id="share" title="Copy a share link">Share</button>
    <button class="btn icon" id="theme" aria-label="Toggle light/dark theme" title="Toggle theme">◐</button>
  </div>
</header>

<main>
  <aside class="card picker" aria-label="Paint picker">
    <div class="head">
      <label class="sr-only" for="q">Search paints</label>
      <input id="q" type="search" placeholder="Search paints…" data-i18n-ph="searchPaints" autocomplete="off" />
      <label class="sr-only" for="brand">Filter by brand</label>
      <select id="brand"><option value="" data-i18n="allBrands">All brands</option></select>
    </div>
    <div class="list" id="list" role="list" aria-label="Paints"></div>
    <div class="count" id="count"></div>
  </aside>

  <section class="workspace">
    <div class="card pad">
      <div class="micro" id="baseLabel" style="margin-bottom:12px">Base colour · main</div>
      <div class="hero" id="hero"></div>
    </div>
    <div class="card pad">
      <div class="stage">
        <div class="wheelcol">
          <canvas id="wheel" class="wcanvas" width="280" height="280" tabindex="0" role="application" aria-label="Colour wheel. Drag a node, or focus here and use arrow keys to adjust the focused colour, [ and ] to move between colours, and + or − to add or remove a colour."></canvas>
          <div class="wctrl"><span class="micro">Light</span><input id="wl" type="range" min="6" max="94" step="1" aria-label="Lightness" style="flex:1" /><button class="btn" id="wrand" style="height:32px;padding:0 12px">↻ Shuffle</button></div>
        </div>
        <div class="palcol">
          <div class="seg" id="seg" role="group" aria-label="Harmony type" style="margin-bottom:12px"></div>
          <div class="palhead">
            <div class="micro">Live palette → nearest paint</div>
            <div class="palctl">
              <button class="btn" id="addnode" aria-label="Add a colour" title="Add a colour">+</button>
              <button class="btn" id="delnode" aria-label="Remove the last added colour" title="Remove the last added colour">−</button>
              <div class="seg" id="realtoggle" role="group" aria-label="Palette fill">
                <button data-fill="ideal" aria-pressed="true">Ideal</button>
                <button data-fill="real" aria-pressed="false">Real</button>
              </div>
            </div>
          </div>
          <div id="livepal" aria-live="off"></div>
        </div>
      </div>
    </div>
    <div class="card pad">
      <div class="tabs" id="tabs" role="tablist" aria-label="Scheme views">
        <button role="tab" id="tab-plan" data-tab="plan" aria-controls="panel-plan" aria-selected="true" tabindex="0">Plan · roles</button>
        <button role="tab" id="tab-equiv" data-tab="equiv" aria-controls="panel-equiv" aria-selected="false" tabindex="-1">Equivalents</button>
        <button role="tab" id="tab-a11y" data-tab="a11y" aria-controls="panel-a11y" aria-selected="false" tabindex="-1">Accessibility</button>
      </div>
      <div data-panel="plan" id="panel-plan" role="tabpanel" aria-labelledby="tab-plan" tabindex="0"></div>
      <div data-panel="equiv" id="panel-equiv" role="tabpanel" aria-labelledby="tab-equiv" tabindex="0" hidden></div>
      <div data-panel="a11y" id="panel-a11y" role="tabpanel" aria-labelledby="tab-a11y" tabindex="0" hidden></div>
    </div>
  </section>
</main>

<div id="status" class="sr-only" aria-live="polite"></div>
<script type="module" src="js/app.js"></script>
<script>if ('serviceWorker' in navigator) addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));</script>
</body>
</html>
